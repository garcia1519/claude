<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 3px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.6rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px 4px rgba(233, 69, 96, 0.5);
    }

    #scores {
      display: flex;
      gap: 2rem;
      margin-top: 1.8rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 0.6rem 1.4rem;
      border-radius: 10px;
    }

    .score-box .label { color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    .score-box .val { font-size: 1.6rem; font-weight: bold; }
    .score-box.x-score .val { color: #e94560; }
    .score-box.o-score .val { color: #a8dadc; }
    .score-box.tie-score .val { color: #f4d03f; }

    #reset {
      margin-top: 1.8rem;
      padding: 0.7rem 2.2rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, transform 0.1s;
    }

    #reset:hover { background: #c73652; transform: scale(1.04); }

    #new-game {
      margin-top: 0.6rem;
      padding: 0.5rem 1.6rem;
      background: transparent;
      color: #888;
      border: 1px solid #444;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    #new-game:hover { color: #eee; border-color: #eee; }
  </style>
</head>
<body>

  <h1>TIC TAC TOE</h1>
  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="scores">
    <div class="score-box x-score">
      <div class="label">Player X</div>
      <div class="val" id="score-x">0</div>
    </div>
    <div class="score-box tie-score">
      <div class="label">Ties</div>
      <div class="val" id="score-tie">0</div>
    </div>
    <div class="score-box o-score">
      <div class="label">Player O</div>
      <div class="val" id="score-o">0</div>
    </div>
  </div>

  <button id="reset">New Round</button>
  <button id="new-game">Reset Scores</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init(resetScores = false) {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      if (resetScores) scores = { X: 0, O: 0, T: 0 };
      render();
    }

    function render() {
      const cells = document.querySelectorAll('.cell');
      cells.forEach((cell, i) => {
        cell.textContent = board[i] || '';
        cell.className = 'cell' + (board[i] ? ` ${board[i].toLowerCase()} taken` : '');
      });
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-tie').textContent = scores.T;
      document.getElementById('status').textContent = gameOver ? '' : `Player ${current}'s turn`;
    }

    function checkWin() {
      return WINS.find(combo => combo.every(i => board[i] === current)) || null;
    }

    function handleClick(e) {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver) return;
      const i = +cell.dataset.i;
      if (board[i]) return;

      board[i] = current;
      render();

      const win = checkWin();
      if (win) {
        win.forEach(i => document.querySelectorAll('.cell')[i].classList.add('win'));
        document.getElementById('status').textContent = `Player ${current} wins!`;
        scores[current]++;
        document.getElementById(`score-${current.toLowerCase()}`).textContent = scores[current];
        gameOver = true;
        return;
      }

      if (board.every(Boolean)) {
        document.getElementById('status').textContent = "It's a tie!";
        scores.T++;
        document.getElementById('score-tie').textContent = scores.T;
        gameOver = true;
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      document.getElementById('status').textContent = `Player ${current}'s turn`;
    }

    document.getElementById('board').addEventListener('click', handleClick);
    document.getElementById('reset').addEventListener('click', () => init(false));
    document.getElementById('new-game').addEventListener('click', () => init(true));

    scores = { X: 0, O: 0, T: 0 };
    init();
  </script>
</body>
</html>
